<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWAs</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }
    h1 { color: #c0c0ff; margin-bottom: 2rem; }
    .tools {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }
    a {
      display: block;
      background: #2a2a4e;
      color: #e0e0e0;
      text-decoration: none;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      border: 1px solid #3a3a6e;
      transition: background 0.15s;
    }
    a:hover { background: #3a3a6e; }
    a .desc {
      font-size: 0.85rem;
      color: #8080a0;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <h1>Tools</h1>
  <div class="tools">
    <a href="ephemerides/">
      Ephemerides Calculator
      <div class="desc">Star and planet positions, altitude, azimuth</div>
    </a>
    <a href="solfa/">
      Solfa
      <div class="desc">Drag-and-drop music composition</div>
    </a>
  </div>
</body>
</html>
